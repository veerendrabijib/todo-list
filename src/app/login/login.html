<div class="min-h-screen flex items-center justify-center bg-gray-100">
 <div class="w-full max-w-md bg-white p-8 rounded-2xl shadow-lg">
  @if (isLogin) {
  <h2 class="text-2xl font-bold text-center text-gray-800 mb-6">
   Login
  </h2>
  <app-text-field label="User Name" placeholder="Enter your name" [(value)]="name"></app-text-field>
  <div class="mt-4">
   <app-text-field label="Password" type="password" placeholder="Enter your password" [(value)]="password"></app-text-field>
  </div>
  <div class="text-right mt-2">
   <a class="text-sm text-blue-600 hover:underline cursor-pointer">
    Forgot password?
   </a>
  </div>
  @if (error.status) {
  <p class="text-sm text-red-600"> {{ error.message }}</p>
  }
  <div class="mt-6">
   <app-button label="Login" variant="primary" (clicked)="login()"></app-button>
  </div>
  <p class="text-center text-sm text-gray-600 mt-6">
   Don't have an account?
   <span class="text-blue-600 cursor-pointer hover:underline" (click)="navigateToSignUp()">
    Sign up
   </span>
  </p>
  }
  @else {
  <h2 class="text-2xl font-bold text-center text-gray-800 mb-6">
   Sign Up
  </h2>
  <app-text-field label="User Name" placeholder="Enter your name" [(value)]="name"></app-text-field>
  <div class="mt-4">
   <app-text-field label="Email" type="email" placeholder="Enter your email" [(value)]="email"></app-text-field>
  </div>
  <div class="mt-4">
   <app-text-field label="Password" type="password" placeholder="Enter your password" [(value)]="password"></app-text-field>
  </div>
  <div class="mt-6">
   <app-button label="Sign Up" variant="primary" (clicked)="login()"></app-button>
  </div>
  }
 </div>
</div>
