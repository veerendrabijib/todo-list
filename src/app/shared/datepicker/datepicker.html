<div class="flex flex-col gap-1">
 <label class="text-sm font-medium text-gray-700">{{ label }}</label>
 <input type="date" [value]="value" [min]="min" [max]="max" [disabled]="disabled" (change)="onChange($event)"
  class="px-3 py-2 border rounded-lg focus:ring-2 focus:ring-blue-500 disabled:bg-gray-100" />
</div>
